<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register - Tourist Safety App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f9fc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      width: 360px;
      box-sizing: border-box;
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
      color: #1a4aa8;
    }
    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
    }
    input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #007bff;
      outline: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #1a4aa8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.25s ease;
    }
    button:hover {
      background: #1060d8;
    }
    .message {
      margin-top: 12px;
      font-size: 14px;
      min-height: 18px;
      color: #e74c3c; /* default error color */
    }
    .message.success {
      color: #148514;
    }
    select {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  box-sizing: border-box;
  transition: border-color 0.2s;
  background: #fff;
  appearance: none;        /* Removes default arrow for full control */
  -webkit-appearance: none;
  -moz-appearance: none;
}

select:focus {
  border-color: #007bff;
  outline: none;
}

  </style>
</head>
<body>

  <div class="register-container">
    <h2>Create Account</h2>

    <form method="POST" action="/register">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="user@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required />
      </div>

      <div class="form-group">
        <label for="latitude">Latitude</label>
        <input type="number" step="any" id="latitude" name="latitude" placeholder="e.g. 23.2561" readonly required />
      </div>

      <div class="form-group">
        <label for="longitude">Longitude</label>
        <input type="number" step="any" id="longitude" name="longitude" placeholder="e.g. 77.4859" readonly required />
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role" required>
            <option value="" disabled selected >Select</option>
          <option value="member" >Member</option>
          <option value="leader">Leader</option>
        </select>
      </div>
      

      <button type="submit">Register</button>
    </form>
    <h4>To login click here :  <a href="/">Login</a></h4>

    <div class="message">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <p class="{{ 'success' if category == 'success' else '' }}">{{ message }}</p>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>
  </div>

  <script>
    function setLocationFields(lat, lon) {
      document.getElementById('latitude').value = lat.toFixed(6);
      document.getElementById('longitude').value = lon.toFixed(6);
    }
  
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          setLocationFields(position.coords.latitude, position.coords.longitude);
        },
        (error) => {
          alert('Could not get your location. Please allow location access or enter manually.');
          // Optionally keep readonly off and let user fill manually if denied
        }
      );
    } else {
      alert('Geolocation is not supported by your browser.');
    }
  </script>
  
</body>
</html>
